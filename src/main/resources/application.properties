spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/spring_test_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:spring_test_user}
spring.datasource.password=${DB_PASSWORD:spring_test_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=never
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.security.admin.username=${APP_ADMIN_USERNAME:admin}
app.security.admin.password=${APP_ADMIN_PASSWORD:admin-password}
app.security.user.username=${APP_USER_USERNAME:student1}
app.security.user.password=${APP_USER_PASSWORD:student-password}
app.security.user.student-id=${APP_USER_STUDENT_ID:1}
